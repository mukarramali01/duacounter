<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0d1a0d"/>

  <!-- Tasbeeh string loop at top -->
  <circle cx="32" cy="10" r="5" fill="none" stroke="#c9a84c" stroke-width="2"/>

  <!-- Vertical string -->
  <line x1="32" y1="15" x2="32" y2="20" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- Bead 1 (top) -->
  <circle cx="32" cy="24" r="4" fill="#c9a84c"/>

  <!-- String -->
  <line x1="32" y1="28" x2="32" y2="31" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- Bead 2 -->
  <circle cx="32" cy="35" r="4" fill="#c9a84c"/>

  <!-- String -->
  <line x1="32" y1="39" x2="32" y2="42" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- Bead 3 (bottom) -->
  <circle cx="32" cy="46" r="4" fill="#c9a84c"/>

  <!-- String curves out to sides at bottom -->
  <path d="M28 46 Q20 52 24 58" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M36 46 Q44 52 40 58" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bottom bead -->
  <circle cx="32" cy="50" r="3" fill="#e8c96d"/>
</svg>
